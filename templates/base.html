<!doctype html>
<html lang="en">
  <head>
    <!-- Shared metadata. Child templates override the SEO blocks when needed. -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{% block meta_description %}Project portfolio for Web Development and Graphic Design work.{% endblock %}">
    <meta name="theme-color" content="#f7f4ef">
    <meta property="og:title" content="{% block og_title %}Project Portfolio{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Selected Web Development and Graphic Design projects in a clean, responsive portfolio.{% endblock %}">
    <meta property="og:type" content="website">
    <title>{% block title %}Project Portfolio{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body>
    <!-- Sticky header used across every page. -->
    <header class="site-header">
      <a class="brand" href="{{ url_for('index') }}" aria-label="Back to the gallery">
        <span class="brand__mark">P</span>
        <span>Portfolio</span>
      </a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="{{ url_for('index') }}">Home</a>
        <a href="{{ url_for('index') }}#about">About</a>
        <a href="{{ url_for('index') }}#projects">Projects</a>
      </nav>
    </header>
    
    <main>
      <!-- Page-specific content is injected here by child templates. -->
      {% block content %}{% endblock %}
    </main>

    <!-- Shared footer with quick navigation back to the main sections. -->
    <footer class="site-footer">
      <div class="site-footer__content">
        <div>
          <a class="brand brand--footer" href="{{ url_for('index') }}" aria-label="Back to the gallery">
            <span class="brand__mark">P</span>
            <span>Portfolio</span>
          </a>
          <p>Selected projects in Web Development and Graphic Design.</p>
        </div>
        <nav class="footer-nav" aria-label="Footer links">
          <a href="{{ url_for('index') }}">Home</a>
          <a href="{{ url_for('index') }}#about">About</a>
          <a href="{{ url_for('index') }}#projects">Projects</a>
        </nav>
      </div>
    </footer>
    <!-- Small progressive enhancement script for search, filters, and carousel focus. -->
    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
  </body>
</html>
